<!DOCTYPE html>
<html>

<head>
    <title> Programare Web - Proiect 1 </title>
    <link type="text/css" rel = "stylesheet" href = "css/stil.css">
    <script src="js/cumparaturi.js"></script>
</head>



<body>
    <h1>
        Cumparaturi
    </h1>
    <div>
        <label for="nume">Nume:</label>
        <input type="text" id="nume">
        
        <br><br>
        
        <label for="cantitate">Cantitate:</label>
        <input type="text" id="cantitate">

        <br><br>
        <button type= "button" id="btnAdauga" onclick="adaugaProdus()">Adaugă</button>
        <br>
        <button type= "button" id="btnSterge" onclick="stergeCatalog()">Sterge Catalog (TOT)</button>
    </div>

    <br><br>
    <table id="tabelProduse" class="tabel">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nume Produs</th>
                <th>Cantitate</th>
            </tr>
        </thead>
        <tbody 
            id="corpulTabelului">
        </tbody>
    </table>


</body>
