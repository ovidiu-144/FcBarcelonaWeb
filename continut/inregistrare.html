<!DOCTYPE html>
<html>

<head>
    <title> Programare Web - Proiect 1 </title>
    <link type="text/css" rel = "stylesheet" href = "css/stil.css">
    <script src="js/script.js"></script>
</head>




<body>

    <h1 class="section-title">
        Devino Culé! Inregistrează-te acum!
    </h1>


    <div class="form-card">
        <form>
            <p class="section-title" style="color: #a50044;">Informații cont:</p>

            <div class="camp-grid">
                <div class="camp">
                    <label for="lastName">Nume:</label>
                    <input type="text" id="lastName" name="lastName" placeholder="Messi">
                </div>
    
                <div class="camp">
                    <label for="firstName">Prenume:</label>
                    <input type="text" id="firstName" name="firstName" placeholder="Lionel">
                </div>
            </div>

            <div class="camp" style="width: 100%;">
                <label for="email">Email:</label>
                <input type="email" id = "email" name="email" placeholder="barca@example.com">
            </div>

            <div class="camp-grid">
                <div class="camp">
                    <label for="userName">Nume Utilizator:</label>
                    <input type="text" id = "userName" name="userName" placeholder="xKing_Messi10">
                </div>

                <div class="camp">
                    <label for="phone">Număr de telefon:</label>
                    <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="0700111222">
                </div>
            </div>

            <div class="camp-grid">
                <div class="camp">
                    <label for="password">Parolă:</label>
                    <input type="password" id="password" name="password" placeholder="****">
                </div>

                <div class="camp">
                    <label for="confirmPassword">Confirmă Parola:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="****">
                </div>
            </div>

            
            <p class="section-title" style="color: #a50044;">Informații personale:</p>

            <div class="camp-grid">
                <div class="camp">
                    <label for="sex">Sex:</label>
                    <select name="sex" id="sex">
                        <option value="M">Masculin</option>
                        <option value="F">Feminin</option>
                    </select> 
                </div>

                <div class="camp">
                    <label for="favPlayer">Jucător preferat</label>
                    <input list="playersList" name="favPlayer" id="favPlayer" placeholder="Lamine Yamal">
                    <datalist id="playersList">
                        <option value="Joan Garcia">
                        <option value="Wojciech Szczesny">
                        <option value="Alejandro Balde">
                        <option value="Ronald Araujo">
                        <option value="Pau Cubarsi">
                        <option value="Andreas Christensen">
                        <option value="Jules Kounde">
                        <option value="Eric Garcia">
                        <option value="Gerard Martin">
                        <option value="Joao Cancelo">
                        <option value="Pablo Gavi">
                        <option value="Pedri">
                        <option value="Frenkie de Jong">
                        <option value="Marc Casado">
                        <option value="Marc Bernal">
                        <option value="Dani Olmo">
                        <option value="Fermin Lopez">
                        <option value="Lamine Yamal">
                        <option value="Raphael Raphinha">
                        <option value="Robert Lewandowski">
                        <option value="Marcus Rashford">
                        <option value="Ferran Torres">
                        <option value="Roony Bardghji">
                    </datalist>
                </div>
            </div>
            <div class="camp-grid">
                <div class="camp">
                    <label for="bornDate">Data Nașterii</label>
                    <input type="date" name = "bornDate" id = "bornDate" placeholder="2005-06-24">
                </div>
                <div class="camp">
                    <label for="bornTime">Ora Nașterii</label>
                    <input type="time" name = "bornTime" id = "bornTime" placeholder="00:00">
                </div>
            </div>
            

            <div class="camp">
                <label for="age">Vârsta</label>
                <label id="ageVal">0</label>
                <input type="range" name = "age" id = "age" min="1" max="101" onInput="document.getElementById('ageVal').textContent = this.value;">
            </div>
            
            <div class="camp">
                <label for="url">Pagină Personală (URL)</label>
                <input type="url" name = "url" id = "url" placeholder="https://www.exemplu.com">
            </div>

            <div class="camp">
                <label for="desc">Descriere</label>
                <input type="text" name = "desc" id ="desc" placeholder="Scrie o scurtă descriere despre tine...">
            </div>

            <div class="camp">
                <label for="color">Culoare Preferată</label>
                <label id="colorVal">#000000</label>
                <input type="color" name = "color" id = "color" onInput="document.getElementById('colorVal').textContent = this.value;">
            </div>
            
            
            <div class="checkbox-wrap">
                <label for="checkbox"> Sunt de acord cu termenii si condițiile</label>
                <input type="checkbox" id ="checkbox" name="checkbox" onchange="document.getElementById('registerButton').disabled = !this.checked;">
            </div>

            <button id="registerButton" class="btn" type="button" onclick="userRegister()" disabled>Inregistrare</button>

            <p id = "mesajInregistrare"></p>

            <p>Informații luate de la <a href="https://www.w3schools.com/" target="_blank">W3Schools.com!</a></p>
            <p>Informații pentru regex-uri <a href="https://uibakery.io/regex-library" target="_blank">uibakery.io</a></p>
        </form>
    </div>
</body>
