<!DOCTYPE html>
<html>

<head>
    <title> Programare Web - Proiect 1 </title>
    <link type="text/css" rel = "stylesheet" href = "css/stil.css">
    <script src="js/script.js"></script>
</head>



<body>

    <h1>
        Video
    </h1>
    <p>
        Această pagina conține formularul de inregistare pentru site
    </p>

    <form>

        <label for="fname">Nume:</label>
        <input type="text" id="fname" name="fname">

        <label for="lname">Prenume:</label>
        <input type="text" id="lname" name="lname">

        <label for="pwd">Parolă:</label>
        <input type="password" id="pwd" name="pwd">

        <label for="email">Email:</label>
        <input type="email" id = "email" name="email">

        <label for="phone">Număr de telefon:</label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}">

        <label for="checkbox"> Sunt de acord cu termenii si condițiile</label>
        <input type="checkbox" id ="checkbox" name="checkbox" >

        <label for="sex">Sex:</label>
        <select name="sex" id="sex">
            <option value="M">M</option>
            <option value="F">F</option>
        </select> 

        <label for="food">Mancare preferată</label>
        <input list="foods" name="food" id="food">
        <datalist id="foods">
            <option value="Pizza">
            <option value="Sarmale">
            <option value="Shaorma">
            <option value="Pateu">
            <option value="Mici">
        </datalist><br>

        <label for="color">Culoare Preferată</label>
        <input type="color" name = "color" id = "color"><br>

        <label for="date">Data Nașterii</label>
        <input type="date" name = "date" id = "date"><br>

        <label for="time">Ora Nașterii</label>
        <input type="time" name = "time" id = "time"><br>

        <label for="varsta">Vârsta</label>
        <input type="range" name = "varsta" id = "varsta" min="0" max="101"><br>

        <label for="adresa">Adresa paginii personale</label>
        <input type="url" name = "adresa" id = "adresa"><br>

        <label for="desc">Descriere</label>
        <input type="text" name = "desc" id ="desc"><br>

        <input type="submit" value="Inregistrare" disabled>
        <p>Informații luate de la <a href="https://www.w3schools.com/" target="_blank">W3Schools.com!</a></p>
    </form>
</body>
