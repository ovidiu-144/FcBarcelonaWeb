<!DOCTYPE html>
<html>

<head>
    <title> Programare Web - Proiect 1 </title>
    <link type="text/css" rel = "stylesheet" href = "css/stil.css">
    <script src="js/storage.js"></script>
    <script src="js/cumparaturi.js"></script>
</head>



<body>
    <h1>
        Listă Transferuri
    </h1>
    <div>
        <label for="name">Nume:</label>
        <input type="text" id="name">
        


        <br><br>
        <button type= "button" id="btnAdauga" onclick="addPlayer()">Adaugă</button>
        <br>
        <button type= "button" id="btnDeletePlayer" onclick="deletePlayer()">Șterge jucător</button>
        <br>
        <button type= "button" id="btnSterge" onclick="deleteList()">Șterge lista de transferuri (TOT)</button>


    </div>

    <div>
        <p>Alege modalitate de stocare:</p>
        <select name="storageType" id="storageType" onchange="setStorage()">
            <option value="localStorage">LocalStorage</option>
            <option value="indexedDB">IndexedDB</option>
        </select> 
    </div>

    <br><br>
    <table id="playersTable" class="tabel">
        <thead>
            <tr>
                <th>ID</th>
                <th>Jucător</th>
                <th>Cotă de Piață</th>
            </tr>
        </thead>
        <tbody 
            id="playersTableBody">
            <tr>
                <td colspan="3">Catalogul este gol</td>
            </tr>
        </tbody>
    </table>


</body>
