<!DOCTYPE html>
<html>

<head>
    <title> Programare Web - Proiect 1 </title>
    <link type="text/css" rel = "stylesheet" href = "css/stil.css">
    <!-- defer -> Executa doar dupa ce s a terminat incarcarea paginii -->
    <script src="js/script.js" defer></script>
</head>



<body>

    <h2>Afișare Date</h2>
    <!-- Button pentru afisarea datei -->
    <button type="button" onclick="afisareData()">Dată</button>
    <p id="data"></p>


    <!-- Buton pentru afisarea timpului curent -->
    <button type="button" onclick="afisareTimp()">Ora</button>
    <p id = "timp"></p>


    <!-- Button pentru afisarea URL-ului -->
    <button type="button" onclick="afisareURL()">URL</button>
    <p id = "url"></p>

    <!-- Button pentru afisarea locatiei -->
    <button type="button" onclick="afisareLocatie()">Locație</button>
    <p id = "locatie"></p>

    <!-- Button pentru numele si verisunea Browser-ului -->
    <button type="button" onclick="afisareBrowser()">Nume-Versiune Browser</button>
    <p id = "numeBrowser"></p>
    <p id = "versiuneBrowser"></p>

    <!-- Button pentru resetare valori -->
    <button type="button" onclick="resetare()">Reset Răspunsuri</button>


    <!-- A 2 a sectiune -->
    <h2>Desenează</h2>

    <section>
        <label for="contColour">Alege culoarea conturului:</label>
        <input type="color" id="contColour" name="contColour" value="#ff0000">
        <br>

        <label for="fillColour">Alege culoarea de umplere:</label>
        <input type="color" id="fillColour" name="fillColour" value="#004d98">
        <br>
        <br>

        <canvas id="myCanvas" width="300" height="150"></canvas>
        <p id = "x1"></p>
        <p id = "y1"></p>

        <p id = "x2"></p>
        <p id = "y2"></p>
    </section>

    <section>
        <label for="posInput">Poziție (index):</label>
        <input type="number" id="posInput" value="1" min="1">

        <label for="colorPicker">Culoare:</label>
        <input type="color" id="colorPicker" value="#ff0000">

        <input type="button" value="Adaugă Linie" onclick="addRow()">
        <input type="button" value="Adaugă Coloană" onclick="addColumn()">
        <table class="tabel" id = "dynamicTable">
            <tr>
                <th>Nume</th>
                <th>Goluri</th>
                <th>Asisturi</th>
            </tr>
            <tr>
                <td>Lionel Messi</td>
                <td>672</td>
                <td>303</td>
            </tr>
            <tr>
                <td>César Rodríguez</td>
                <td>225</td>
                <td>2</td>
            </tr>
            <tr>
                <td>Luis Suárez</td>
                <td>195</td>
                <td>113</td>
            </tr>
        </table>
    </section>
</body>
